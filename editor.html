<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Talk Editor</title>
<script src="talk-content.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #f4efe4;
    --card: rgba(255, 252, 246, 0.9);
    --line: rgba(99, 77, 46, 0.16);
    --text: #251d14;
    --muted: #786347;
    --accent: #8c7650;
    --accent-strong: #5c4727;
    --shadow: 0 16px 48px rgba(61, 48, 28, 0.1);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background:
      radial-gradient(circle at top, rgba(224, 201, 154, 0.32), transparent 32%),
      linear-gradient(180deg, #faf7f2 0%, var(--bg) 58%, #ede4d2 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  .shell {
    width: min(1200px, calc(100vw - 28px));
    margin: 0 auto;
    padding: 28px 0 44px;
  }

  .hero {
    position: sticky;
    top: 0;
    z-index: 20;
    margin-bottom: 22px;
    padding: 22px 24px 18px;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: rgba(251, 247, 239, 0.94);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--muted);
    font: 600 11px/1 'Inter', sans-serif;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  h1 {
    margin: 0;
    font: 500 clamp(2.25rem, 4vw, 3.6rem)/0.96 'Cormorant Garamond', serif;
  }

  .hero p {
    margin: 10px 0 0;
    max-width: 52rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }

  .toolbar a,
  .toolbar button {
    appearance: none;
    border: 1px solid rgba(92, 71, 39, 0.18);
    background: rgba(255, 255, 255, 0.74);
    color: var(--accent-strong);
    min-height: 42px;
    padding: 0 14px;
    border-radius: 999px;
    font: 500 0.92rem/1 'Inter', sans-serif;
    text-decoration: none;
    cursor: pointer;
  }

  .toolbar button.primary {
    background: var(--accent);
    color: #fffaf1;
    border-color: var(--accent);
  }

  #status {
    margin-top: 12px;
    min-height: 1.2em;
    color: var(--muted);
    font-size: 0.92rem;
  }

  .subtoolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-top: 14px;
  }

  .subtoolbar select,
  .subtoolbar button {
    appearance: none;
    min-height: 40px;
    padding: 0 12px;
    border-radius: 12px;
    border: 1px solid rgba(92, 71, 39, 0.18);
    background: rgba(255,255,255,0.74);
    color: var(--accent-strong);
    font: 500 0.92rem/1 'Inter', sans-serif;
  }

  .subtoolbar .mode-indicator {
    color: var(--muted);
    font-size: 0.92rem;
  }

  .jump-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 0 0 20px;
  }

  .jump-list a {
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(92, 71, 39, 0.14);
    background: rgba(255,255,255,0.68);
    color: var(--accent-strong);
    font: 500 0.82rem/1 'Inter', sans-serif;
    text-decoration: none;
  }

  .cards {
    display: grid;
    gap: 16px;
  }

  .card {
    padding: 20px;
    border: 1px solid var(--line);
    border-radius: 22px;
    background: var(--card);
    box-shadow: 0 12px 30px rgba(69, 52, 28, 0.08);
  }

  .card.is-target {
    border-color: rgba(140, 118, 80, 0.42);
    box-shadow: 0 18px 36px rgba(104, 80, 45, 0.16);
  }

  .card-head {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 14px;
  }

  .card-index {
    color: var(--muted);
    font: 600 11px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .card-title {
    font: 500 1.8rem/1 'Cormorant Garamond', serif;
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.wide {
    grid-column: 1 / -1;
  }

  .field label {
    color: var(--muted);
    font: 600 11px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .field textarea,
  .field input {
    width: 100%;
    border: 1px solid rgba(92, 71, 39, 0.16);
    border-radius: 16px;
    background: rgba(255,255,255,0.78);
    color: var(--text);
    font: 400 0.96rem/1.5 'Inter', sans-serif;
    padding: 12px 14px;
  }

  .field textarea {
    min-height: 120px;
    resize: vertical;
  }

  .field textarea.short {
    min-height: 84px;
  }

  .field .preview {
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(248, 243, 232, 0.86);
    color: #55452d;
    line-height: 1.5;
    white-space: pre-wrap;
  }
 </style>
</head>
<body>
<main class="shell">
  <section class="hero">
    <p class="eyebrow">Inline Editor</p>
    <h1>BG Talk Content</h1>
    <p>Edit one canonical file and have the deck and audio flow load it directly. If this page is served through the local editor server, save writes straight to disk. Otherwise the fallback is downloading an updated <code>talk-content.js</code>.</p>
    <div class="toolbar">
      <button id="save-button" class="primary" type="button">Save To Disk</button>
      <button id="download-button" type="button">Download File</button>
      <a id="deck-link" href="slides-v0.3.html">Open Deck</a>
      <a id="back-link" href="slides-v0.3.html">Return</a>
    </div>
    <div class="subtoolbar">
      <button id="prev-slide" type="button">Prev Slide</button>
      <button id="next-slide" type="button">Next Slide</button>
      <select id="slide-select" aria-label="Jump to slide"></select>
      <button id="toggle-view" type="button">Show All Slides</button>
      <span id="mode-indicator" class="mode-indicator"></span>
    </div>
    <div id="status"></div>
  </section>

  <nav id="jump-list" class="jump-list"></nav>
  <section id="cards" class="cards"></section>
</main>

<script>
  var sourceContent = (window.TALK_CONTENT && Array.isArray(window.TALK_CONTENT.slides))
    ? window.TALK_CONTENT
    : { meta: {}, slides: [] };
  var state = JSON.parse(JSON.stringify(sourceContent));
  var query = new URLSearchParams(window.location.search);
  var targetSlide = Number(query.get('slide') || '0');
  var returnUrl = query.get('return') || 'slides-v0.3.html';
  var focusMode = query.get('view') === 'all' ? false : targetSlide > 0;

  document.getElementById('back-link').href = returnUrl;

  function setStatus(message, isError) {
    var status = document.getElementById('status');
    status.textContent = message;
    status.style.color = isError ? '#9b2c2c' : '#786347';
  }

  function serializeTalkContent() {
    return 'const TALK_CONTENT = ' + JSON.stringify(state, null, 2) + ';\n\n'
      + "if (typeof window !== 'undefined') {\n"
      + '  window.TALK_CONTENT = TALK_CONTENT;\n'
      + '}\n\n'
      + "if (typeof module !== 'undefined' && module.exports) {\n"
      + '  module.exports = TALK_CONTENT;\n'
      + '}\n';
  }

  function downloadContentFile() {
    var blob = new Blob([serializeTalkContent()], { type: 'application/javascript' });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    link.download = 'talk-content.js';
    link.click();
    URL.revokeObjectURL(url);
    setStatus('Downloaded updated talk-content.js');
  }

  async function saveContentFile() {
    var payload = serializeTalkContent();
    try {
      var response = await fetch('/api/save-talk-content', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/javascript'
        },
        body: payload
      });

      if (!response.ok) {
        throw new Error('save failed');
      }

      setStatus('Saved talk-content.js to disk');
    } catch (error) {
      setStatus('Direct save is unavailable here. Downloading the file instead.', true);
      downloadContentFile();
    }
  }

  function createField(slide, key, label, options) {
    var field = document.createElement('div');
    field.className = 'field' + (options && options.wide ? ' wide' : '');

    var labelEl = document.createElement('label');
    labelEl.textContent = label;
    field.appendChild(labelEl);

    var input = options && options.singleLine
      ? document.createElement('input')
      : document.createElement('textarea');

    if (!options || !options.singleLine) {
      input.className = options && options.short ? 'short' : '';
    }

    input.value = slide[key] || '';
    input.addEventListener('input', function() {
      slide[key] = input.value;
      setStatus('Unsaved changes');
    });
    field.appendChild(input);

    return field;
  }

  function createPreview(slide) {
    var field = document.createElement('div');
    field.className = 'field wide';

    var label = document.createElement('label');
    label.textContent = 'Visible Slide Text';
    field.appendChild(label);

    var preview = document.createElement('div');
    preview.className = 'preview';

    if (slide.type === 'title') {
      preview.textContent = (slide.title || '') + '\n\n' + (slide.subtitle || '');
    } else if (slide.type === 'quote') {
      preview.textContent = '"' + (slide.quote || '') + '"\n— ' + (slide.attribution || '');
    } else if (slide.type === 'dim') {
      preview.textContent = slide.text || '';
    } else if (slide.type === 'closing') {
      preview.textContent = (slide.title || '') + '\n\n' + (slide.footer || '');
    } else {
      preview.textContent = 'Visual-only slide';
    }

    field.appendChild(preview);
    return field;
  }

  function renderCards() {
    var cards = document.getElementById('cards');
    var jumpList = document.getElementById('jump-list');
    var slideSelect = document.getElementById('slide-select');
    var toggleView = document.getElementById('toggle-view');
    var modeIndicator = document.getElementById('mode-indicator');
    cards.innerHTML = '';
    jumpList.innerHTML = '';
    slideSelect.innerHTML = '';

    toggleView.textContent = focusMode ? 'Show All Slides' : 'Focus Current Slide';
    modeIndicator.textContent = focusMode && targetSlide > 0
      ? 'Focused on slide ' + targetSlide
      : 'Showing all slides';

    state.slides.forEach(function(slide, idx) {
      var slideNumber = idx + 1;
      var showSlide = !focusMode || slideNumber === targetSlide;

      var option = document.createElement('option');
      option.value = String(slideNumber);
      option.textContent = 'Slide ' + slideNumber + ' — ' + (slide.editorLabel || slide.slug || ('Slide ' + slideNumber));
      if (slideNumber === targetSlide || (!targetSlide && slideNumber === 1)) {
        option.selected = true;
      }
      slideSelect.appendChild(option);

      var jump = document.createElement('a');
      jump.href = '#slide-' + slideNumber;
      jump.textContent = slideNumber + '. ' + (slide.editorLabel || slide.slug || ('Slide ' + slideNumber));
      jumpList.appendChild(jump);

      if (!showSlide) {
        return;
      }

      var card = document.createElement('article');
      card.className = 'card' + (slideNumber === targetSlide ? ' is-target' : '');
      card.id = 'slide-' + slideNumber;

      var head = document.createElement('div');
      head.className = 'card-head';
      head.innerHTML = ''
        + '<div class="card-index">Slide ' + slideNumber + '</div>'
        + '<div class="card-title">' + (slide.editorLabel || slide.slug || ('Slide ' + slideNumber)) + '</div>';
      card.appendChild(head);

      var grid = document.createElement('div');
      grid.className = 'field-grid';
      grid.appendChild(createPreview(slide));

      if (slide.type === 'title') {
        grid.appendChild(createField(slide, 'title', 'Title', { short: true }));
        grid.appendChild(createField(slide, 'subtitle', 'Subtitle', { short: true }));
      }

      if (slide.type === 'quote') {
        grid.appendChild(createField(slide, 'quote', 'Quote', { short: true }));
        grid.appendChild(createField(slide, 'attribution', 'Attribution', { singleLine: true }));
      }

      if (slide.type === 'dim') {
        grid.appendChild(createField(slide, 'text', 'Visible Text', { short: true, wide: true }));
      }

      if (slide.type === 'closing') {
        grid.appendChild(createField(slide, 'title', 'Closing Title', { short: true }));
        grid.appendChild(createField(slide, 'footer', 'Footer', { short: true }));
      }

      grid.appendChild(createField(slide, 'notes', 'Full Notes', { wide: true }));
      grid.appendChild(createField(slide, 'outline', 'Outline Notes', { wide: true }));
      grid.appendChild(createField(slide, 'audio', 'Audio Text', { wide: true }));
      grid.appendChild(createField(slide, 'comment', 'Editor Comment', { wide: true, short: true }));

      card.appendChild(grid);
      cards.appendChild(card);
    });

    if (targetSlide > 0) {
      setTimeout(function() {
        var target = document.getElementById('slide-' + targetSlide);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          var firstTextarea = target.querySelector('textarea, input');
          if (firstTextarea) {
            firstTextarea.focus();
          }
        }
      }, 100);
    }
  }

  function updateQueryState() {
    var next = new URLSearchParams(window.location.search);
    if (targetSlide > 0) {
      next.set('slide', String(targetSlide));
    } else {
      next.delete('slide');
    }
    if (!focusMode) {
      next.set('view', 'all');
    } else {
      next.delete('view');
    }
    if (returnUrl) {
      next.set('return', returnUrl);
    }
    history.replaceState(null, '', 'editor.html?' + next.toString());
  }

  function goToSlide(slideNumber) {
    targetSlide = Math.max(1, Math.min(state.slides.length, slideNumber));
    updateQueryState();
    renderCards();
  }

  document.getElementById('save-button').addEventListener('click', saveContentFile);
  document.getElementById('download-button').addEventListener('click', downloadContentFile);
  document.getElementById('prev-slide').addEventListener('click', function() {
    goToSlide((targetSlide || 1) - 1);
  });
  document.getElementById('next-slide').addEventListener('click', function() {
    goToSlide((targetSlide || 1) + 1);
  });
  document.getElementById('slide-select').addEventListener('change', function(event) {
    goToSlide(Number(event.target.value));
  });
  document.getElementById('toggle-view').addEventListener('click', function() {
    focusMode = !focusMode;
    if (!targetSlide) {
      targetSlide = 1;
    }
    updateQueryState();
    renderCards();
  });
  document.addEventListener('keydown', function(event) {
    if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 's') {
      event.preventDefault();
      saveContentFile();
    }
  });

  if (!targetSlide && state.slides.length) {
    targetSlide = 1;
  }
  renderCards();
</script>
</body>
</html>
