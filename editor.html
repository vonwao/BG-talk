<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Talk Editor</title>
<script src="talk-content.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #f4efe4;
    --paper: rgba(255, 252, 246, 0.9);
    --sidebar: rgba(251, 247, 239, 0.94);
    --line: rgba(99, 77, 46, 0.16);
    --text: #251d14;
    --muted: #786347;
    --accent: #8c7650;
    --accent-strong: #5c4727;
    --accent-soft: rgba(140, 118, 80, 0.12);
    --shadow: 0 16px 48px rgba(61, 48, 28, 0.1);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background:
      radial-gradient(circle at top, rgba(224, 201, 154, 0.32), transparent 32%),
      linear-gradient(180deg, #faf7f2 0%, var(--bg) 58%, #ede4d2 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  .app {
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
    gap: 22px;
    width: min(1440px, calc(100vw - 24px));
    margin: 0 auto;
    padding: 18px 0 28px;
  }

  .sidebar {
    position: sticky;
    top: 14px;
    align-self: start;
    max-height: calc(100vh - 28px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 22px 18px 18px;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--sidebar);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--muted);
    font: 600 11px/1 'Inter', sans-serif;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .sidebar h1 {
    margin: 0;
    font: 500 2.5rem/0.95 'Cormorant Garamond', serif;
  }

  .sidebar-copy {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .stack {
    display: grid;
    gap: 10px;
  }

  .btn,
  .picker {
    appearance: none;
    width: 100%;
    min-height: 42px;
    padding: 0 14px;
    border: 1px solid rgba(92, 71, 39, 0.18);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.78);
    color: var(--accent-strong);
    font: 500 0.92rem/1 'Inter', sans-serif;
    text-decoration: none;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .btn.primary {
    background: var(--accent);
    color: #fffaf1;
    border-color: var(--accent);
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .sidebar-section {
    display: grid;
    gap: 8px;
    min-height: 0;
  }

  .section-label {
    color: var(--muted);
    font: 600 11px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  #status {
    min-height: 1.2em;
    color: var(--muted);
    font-size: 0.92rem;
  }

  .slide-list {
    min-height: 0;
    overflow: auto;
    padding-right: 4px;
    display: grid;
    gap: 6px;
  }

  .slide-link {
    display: grid;
    gap: 2px;
    padding: 10px 12px;
    border: 1px solid transparent;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.46);
    color: var(--text);
    text-align: left;
    cursor: pointer;
  }

  .slide-link.is-active {
    background: var(--accent-soft);
    border-color: rgba(140, 118, 80, 0.3);
  }

  .slide-link-index {
    color: var(--muted);
    font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .slide-link-title {
    font-size: 0.92rem;
    line-height: 1.35;
  }

  .editor-pane {
    min-width: 0;
  }

  .editor-card {
    min-height: calc(100vh - 36px);
    padding: 28px;
    border: 1px solid var(--line);
    border-radius: 28px;
    background: var(--paper);
    box-shadow: 0 18px 48px rgba(69, 52, 28, 0.08);
  }

  .editor-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .editor-index {
    color: var(--muted);
    font: 600 11px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .editor-type {
    color: #8b734b;
    font-size: 0.95rem;
  }

  .editor-card h2 {
    margin: 0;
    font: 500 clamp(2rem, 4vw, 3.6rem)/0.95 'Cormorant Garamond', serif;
  }

  .editor-note {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 0.98rem;
    line-height: 1.5;
  }

  .fields {
    display: grid;
    gap: 18px;
    margin-top: 26px;
  }

  .field-group {
    display: grid;
    gap: 8px;
  }

  .field-group label {
    color: var(--muted);
    font: 600 11px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .field-help {
    color: #8c7550;
    font-size: 0.9rem;
    line-height: 1.45;
  }

  .field-group textarea,
  .field-group input {
    width: 100%;
    border: 1px solid rgba(92, 71, 39, 0.16);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.84);
    color: var(--text);
    font: 400 1rem/1.6 'Inter', sans-serif;
    padding: 14px 16px;
  }

  .field-group textarea {
    resize: vertical;
    min-height: 180px;
  }

  .field-group textarea.compact {
    min-height: 110px;
  }

  .field-group textarea.tall {
    min-height: 320px;
  }

  .empty-visual {
    padding: 14px 16px;
    border-radius: 18px;
    background: rgba(245, 239, 226, 0.84);
    color: #69563a;
    line-height: 1.5;
  }

  @media (max-width: 980px) {
    .app {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: static;
      max-height: none;
    }

    .editor-card {
      min-height: auto;
    }
  }
</style>
</head>
<body>
<main class="app">
  <aside class="sidebar">
    <div>
      <p class="eyebrow">Inline Editor</p>
      <h1>BG Talk</h1>
      <p id="sidebar-copy" class="sidebar-copy">Pick a slide on the left. Edit only that slide’s text on the right. Save writes directly to <code>talk-content.js</code>.</p>
    </div>

    <div class="stack">
      <button id="save-button" class="btn primary" type="button">Save To Disk</button>
      <button id="download-button" class="btn" type="button">Download File</button>
      <div class="btn-row">
        <button id="prev-slide" class="btn" type="button">Prev</button>
        <button id="next-slide" class="btn" type="button">Next</button>
      </div>
      <select id="slide-select" class="picker" aria-label="Jump to slide"></select>
      <a id="deck-link" class="btn" href="slides-v0.3.html">Open Current Slide</a>
      <a id="back-link" class="btn" href="slides-v0.3.html">Return</a>
      <div id="status"></div>
    </div>

    <section class="sidebar-section">
      <div class="section-label">Slides</div>
      <div id="slide-list" class="slide-list"></div>
    </section>
  </aside>

  <section class="editor-pane">
    <article class="editor-card">
      <div class="editor-meta">
        <div id="editor-index" class="editor-index"></div>
        <div id="editor-type" class="editor-type"></div>
      </div>
      <h2 id="editor-title"></h2>
      <p id="editor-note" class="editor-note"></p>
      <div id="editor-fields" class="fields"></div>
    </article>
  </section>
</main>

<script>
  var sourceContent = (window.TALK_CONTENT && Array.isArray(window.TALK_CONTENT.slides))
    ? window.TALK_CONTENT
    : { meta: {}, slides: [] };
  var state = JSON.parse(JSON.stringify(sourceContent));
  var query = new URLSearchParams(window.location.search);
  var currentSlideIndex = Math.max(0, Math.min(state.slides.length - 1, Number(query.get('slide') || '1') - 1));
  var returnUrl = query.get('return') || 'slides-v0.3.html';
  var directSaveAvailable = ['127.0.0.1', 'localhost', '::1'].indexOf(window.location.hostname) !== -1;

  document.getElementById('back-link').href = returnUrl;

  function currentSlide() {
    return state.slides[currentSlideIndex] || {};
  }

  function setStatus(message, isError) {
    var status = document.getElementById('status');
    status.textContent = message;
    status.style.color = isError ? '#9b2c2c' : '#786347';
  }

  function configureSaveMode() {
    var sidebarCopy = document.getElementById('sidebar-copy');
    var saveButton = document.getElementById('save-button');
    var downloadButton = document.getElementById('download-button');

    if (directSaveAvailable) {
      sidebarCopy.innerHTML = 'Pick a slide on the left. Edit only that slide&#8217;s text on the right. Save writes directly to <code>talk-content.js</code>.';
      saveButton.textContent = 'Save To Disk';
      downloadButton.hidden = false;
      setStatus('Local save mode');
      return;
    }

    sidebarCopy.innerHTML = 'This hosted editor is export-only. Edit here, then download <code>talk-content.js</code> and replace the local file in the repo.';
    saveButton.textContent = 'Download File';
    downloadButton.hidden = true;
    setStatus('Hosted mode: download the edited file', true);
  }

  function serializeTalkContent() {
    return 'const TALK_CONTENT = ' + JSON.stringify(state, null, 2) + ';\n\n'
      + "if (typeof window !== 'undefined') {\n"
      + '  window.TALK_CONTENT = TALK_CONTENT;\n'
      + '}\n\n'
      + "if (typeof module !== 'undefined' && module.exports) {\n"
      + '  module.exports = TALK_CONTENT;\n'
      + '}\n';
  }

  function downloadContentFile() {
    var blob = new Blob([serializeTalkContent()], { type: 'application/javascript' });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    link.download = 'talk-content.js';
    link.click();
    URL.revokeObjectURL(url);
    setStatus('Downloaded updated talk-content.js');
  }

  async function saveContentFile() {
    if (!directSaveAvailable) {
      downloadContentFile();
      return;
    }

    var payload = serializeTalkContent();
    try {
      var response = await fetch('/api/save-talk-content', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/javascript'
        },
        body: payload
      });

      if (!response.ok) {
        throw new Error('save failed');
      }

      setStatus('Saved talk-content.js to disk');
    } catch (error) {
      setStatus('Direct save unavailable here. Downloading instead.', true);
      downloadContentFile();
    }
  }

  function updateQueryState() {
    var next = new URLSearchParams(window.location.search);
    next.set('slide', String(currentSlideIndex + 1));
    if (returnUrl) {
      next.set('return', returnUrl);
    }
    history.replaceState(null, '', 'editor.html?' + next.toString());
  }

  function goToSlide(index) {
    currentSlideIndex = Math.max(0, Math.min(state.slides.length - 1, index));
    updateQueryState();
    render();
  }

  function createTextField(parent, slide, key, label, help, options) {
    var group = document.createElement('div');
    group.className = 'field-group';

    var labelEl = document.createElement('label');
    labelEl.textContent = label;
    group.appendChild(labelEl);

    if (help) {
      var helpEl = document.createElement('div');
      helpEl.className = 'field-help';
      helpEl.textContent = help;
      group.appendChild(helpEl);
    }

    var input = options && options.singleLine
      ? document.createElement('input')
      : document.createElement('textarea');

    if (!options || !options.singleLine) {
      input.className = options && options.className ? options.className : '';
    }

    input.value = slide[key] || '';
    input.addEventListener('input', function() {
      slide[key] = input.value;
      setStatus('Unsaved changes');
    });
    group.appendChild(input);
    parent.appendChild(group);
  }

  function createStaticNote(parent, text) {
    var group = document.createElement('div');
    group.className = 'field-group';

    var labelEl = document.createElement('label');
    labelEl.textContent = 'On-Screen Text';
    group.appendChild(labelEl);

    var box = document.createElement('div');
    box.className = 'empty-visual';
    box.textContent = text;
    group.appendChild(box);
    parent.appendChild(group);
  }

  function renderVisibleFields(parent, slide) {
    if (slide.type === 'title') {
      createTextField(parent, slide, 'title', 'On-Screen Title', 'Use line breaks where you want them to appear on the slide.', { className: 'compact' });
      createTextField(parent, slide, 'subtitle', 'On-Screen Subtitle', '', { className: 'compact' });
      return;
    }

    if (slide.type === 'quote') {
      createTextField(parent, slide, 'quote', 'On-Screen Quote', 'This is the large quote shown to the audience.', { className: 'compact' });
      createTextField(parent, slide, 'attribution', 'Attribution', '', { singleLine: true });
      return;
    }

    if (slide.type === 'dim') {
      createTextField(parent, slide, 'text', 'On-Screen Text', '', { className: 'compact' });
      return;
    }

    if (slide.type === 'closing') {
      createTextField(parent, slide, 'title', 'Closing Title', '', { className: 'compact' });
      createTextField(parent, slide, 'footer', 'Closing Footer', '', { className: 'compact' });
      return;
    }

    createStaticNote(parent, 'This slide is visual-only. Edit the spoken text below.');
  }

  function renderSidebar() {
    var slideList = document.getElementById('slide-list');
    var slideSelect = document.getElementById('slide-select');
    var deckLink = document.getElementById('deck-link');
    slideList.innerHTML = '';
    slideSelect.innerHTML = '';

    state.slides.forEach(function(slide, idx) {
      var option = document.createElement('option');
      option.value = String(idx);
      option.textContent = 'Slide ' + (idx + 1) + ' — ' + (slide.editorLabel || slide.slug || ('Slide ' + (idx + 1)));
      option.selected = idx === currentSlideIndex;
      slideSelect.appendChild(option);

      var button = document.createElement('button');
      button.type = 'button';
      button.className = 'slide-link' + (idx === currentSlideIndex ? ' is-active' : '');
      button.addEventListener('click', function() {
        goToSlide(idx);
      });

      var index = document.createElement('div');
      index.className = 'slide-link-index';
      index.textContent = 'Slide ' + (idx + 1);
      button.appendChild(index);

      var title = document.createElement('div');
      title.className = 'slide-link-title';
      title.textContent = slide.editorLabel || slide.slug || ('Slide ' + (idx + 1));
      button.appendChild(title);

      slideList.appendChild(button);
    });

    deckLink.href = 'slides-v0.3.html#/' + currentSlideIndex;
  }

  function renderEditor() {
    var slide = currentSlide();
    var fields = document.getElementById('editor-fields');

    document.getElementById('editor-index').textContent = 'Slide ' + (currentSlideIndex + 1) + ' of ' + state.slides.length;
    document.getElementById('editor-type').textContent = (slide.editorLabel || slide.slug || '').trim();
    document.getElementById('editor-title').textContent = slide.editorLabel || slide.slug || ('Slide ' + (currentSlideIndex + 1));
    document.getElementById('editor-note').textContent = directSaveAvailable
      ? 'Edit the slide text here. Save writes back to talk-content.js, which the deck and audio workflow load directly.'
      : 'Edit the slide text here, then download the updated talk-content.js file. The live site can preview edits, but only the local editor server can write to disk.';

    fields.innerHTML = '';

    renderVisibleFields(fields, slide);
    createTextField(fields, slide, 'notes', 'Speaker Notes', 'This is the main rehearsal text shown in the deck notes panel.', { className: 'tall' });
    createTextField(fields, slide, 'outline', 'Outline Cues', 'Short prompts for rehearsal mode.', { className: 'compact' });
    createTextField(fields, slide, 'audio', 'Audio Narration', 'Separate wording for ElevenLabs, if you want cleaner spoken rhythm.', { className: 'compact' });
    createTextField(fields, slide, 'comment', 'Comment', 'Optional note to yourself about this slide.', { className: 'compact' });

    var firstInput = fields.querySelector('textarea, input');
    if (firstInput) {
      firstInput.focus();
    }
  }

  function render() {
    renderSidebar();
    renderEditor();
  }

  document.getElementById('save-button').addEventListener('click', saveContentFile);
  document.getElementById('download-button').addEventListener('click', downloadContentFile);
  document.getElementById('prev-slide').addEventListener('click', function() {
    goToSlide(currentSlideIndex - 1);
  });
  document.getElementById('next-slide').addEventListener('click', function() {
    goToSlide(currentSlideIndex + 1);
  });
  document.getElementById('slide-select').addEventListener('change', function(event) {
    goToSlide(Number(event.target.value));
  });
  document.addEventListener('keydown', function(event) {
    if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 's') {
      event.preventDefault();
      saveContentFile();
      return;
    }

    if (event.target && (event.target.tagName === 'TEXTAREA' || event.target.tagName === 'INPUT')) {
      return;
    }

    if (event.key === '[') {
      goToSlide(currentSlideIndex - 1);
    }

    if (event.key === ']') {
      goToSlide(currentSlideIndex + 1);
    }
  });

  configureSaveMode();
  render();
</script>
</body>
</html>
