<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Talk Audio Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #f7f2e7;
    --paper: rgba(255, 253, 248, 0.86);
    --line: rgba(113, 92, 55, 0.18);
    --text: #241d14;
    --muted: #756247;
    --accent: #8c7650;
    --accent-strong: #5c4727;
    --shadow: 0 24px 80px rgba(70, 54, 28, 0.14);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at top, rgba(220, 198, 148, 0.38), transparent 36%),
      linear-gradient(180deg, #fbf8f2 0%, var(--bg) 58%, #efe7d8 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  main {
    width: min(980px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 48px 0 64px;
  }

  .hero {
    margin-bottom: 28px;
    padding: 28px 30px 22px;
    border: 1px solid var(--line);
    border-radius: 28px;
    background: linear-gradient(180deg, rgba(255,255,255,0.74), rgba(255,250,241,0.84));
    box-shadow: var(--shadow);
  }

  .eyebrow {
    margin: 0 0 10px;
    color: var(--muted);
    font: 600 12px/1 'Inter', sans-serif;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  h1 {
    margin: 0;
    font: 500 clamp(2.4rem, 5vw, 4rem)/0.95 'Cormorant Garamond', serif;
    letter-spacing: 0.01em;
  }

  .subtitle {
    margin: 12px 0 0;
    max-width: 42rem;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.5;
  }

  .samples {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 18px;
  }

  .sample {
    padding: 22px 22px 18px;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--paper);
    box-shadow: 0 12px 36px rgba(66, 50, 26, 0.08);
    backdrop-filter: blur(8px);
  }

  .sample-label {
    margin: 0 0 6px;
    color: var(--muted);
    font: 600 11px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .sample h2 {
    margin: 0 0 10px;
    font: 500 2rem/0.95 'Cormorant Garamond', serif;
  }

  .sample p {
    margin: 0 0 14px;
    color: #55452d;
    line-height: 1.55;
  }

  audio {
    width: 100%;
    margin-bottom: 12px;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .actions a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 0 14px;
    border: 1px solid rgba(92, 71, 39, 0.18);
    border-radius: 999px;
    color: var(--accent-strong);
    text-decoration: none;
    font: 500 0.92rem/1 'Inter', sans-serif;
    background: rgba(255,255,255,0.72);
  }

  .actions a:hover {
    border-color: rgba(92, 71, 39, 0.35);
    background: rgba(255,255,255,0.95);
  }

  .note {
    margin-top: 22px;
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.5;
  }
 </style>
</head>
<body>
<main>
  <section class="hero">
    <p class="eyebrow">Audio Preview</p>
    <h1 id="hero-title"></h1>
    <p class="subtitle">Quick browser players for generated narration, plus jump links into the full audio-enabled deck.</p>
  </section>

  <section class="samples" id="samples"></section>
  <script src="talk-content.js"></script>
  <script>
    document.getElementById('hero-title').textContent = TALK_CONTENT.meta.title;
    const container = document.getElementById('samples');
    TALK_CONTENT.slides.forEach((slide, i) => {
      const num = String(i + 1).padStart(2, '0');
      const mp3 = `audio/slides/slide-${num}-${slide.slug}.mp3`;
      const label = slide.editorLabel || slide.slug;
      const hasAudio = slide.audio && slide.audio.trim();
      if (!hasAudio) return;

      const article = document.createElement('article');
      article.className = 'sample';
      article.innerHTML = `
        <p class="sample-label">Slide ${i + 1}</p>
        <h2>${label}</h2>
        <audio controls preload="metadata" src="${mp3}"></audio>
        <div class="actions">
          <a href="${mp3}">Open MP3</a>
          <a href="slides-v0.3.html?audio=1#/${i}">Open In Audio Deck</a>
          <a href="editor.html?slide=${i + 1}&return=audio-preview.html">Edit This Slide</a>
        </div>
      `;
      container.appendChild(article);
    });
  </script>

  <p class="note">If the deck link opens without sound at first, click once to satisfy browser autoplay rules, then it will play the slide narration.</p>
</main>
</body>
</html>
