<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Talk Phone Outline</title>
<script src="talk-content.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #060606;
    --bg-deep: #121212;
    --surface: rgba(255, 247, 233, 0.05);
    --surface-strong: rgba(255, 247, 233, 0.08);
    --line: rgba(214, 185, 134, 0.18);
    --line-strong: rgba(214, 185, 134, 0.32);
    --text: #f4ead9;
    --text-soft: #d2c1a2;
    --muted: #aa9676;
    --accent: #f2d3a0;
    --accent-soft: #c8ab79;
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    background:
      radial-gradient(circle at top, rgba(242, 211, 160, 0.1), transparent 28%),
      linear-gradient(180deg, #000 0%, var(--bg) 54%, var(--bg-deep) 100%);
  }

  a {
    color: inherit;
  }

  .shell {
    width: min(760px, calc(100vw - 24px));
    margin: 0 auto;
    padding: 18px 0 56px;
  }

  .hero {
    margin-bottom: 18px;
    padding: 0 0 14px;
    border-bottom: 1px solid var(--line);
  }

  .eyebrow {
    margin: 0;
    color: var(--muted);
    font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  h1 {
    margin: 8px 0 0;
    font: 600 clamp(1.92rem, 9vw, 3.05rem)/0.93 'Cormorant Garamond', serif;
    letter-spacing: -0.02em;
  }

  .subtitle {
    margin: 8px 0 0;
    color: var(--text-soft);
    font-size: 1.06rem;
    line-height: 1.52;
    max-width: 42rem;
  }

  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  .pill,
  .hero-link {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 0 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--surface-strong);
    color: var(--accent);
    font: 500 0.84rem/1 'Inter', sans-serif;
    text-decoration: none;
  }

  .hero-link {
    border-color: var(--line-strong);
  }

  .mode-toggle {
    display: inline-flex;
    gap: 6px;
    margin-top: 14px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--surface-strong);
  }

  .mode-button {
    appearance: none;
    border: none;
    min-height: 34px;
    padding: 0 14px;
    border-radius: 999px;
    background: transparent;
    color: var(--muted);
    font: 600 0.82rem/1 'Inter', sans-serif;
    letter-spacing: 0.04em;
  }

  .mode-button.is-active {
    background: rgba(242, 211, 160, 0.14);
    color: var(--accent);
  }

  .jump-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .jump-link {
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text-soft);
    font-size: 0.78rem;
    line-height: 1.2;
    text-decoration: none;
  }

  .sections {
    display: block;
  }

  .slide-section {
    scroll-margin-top: 24px;
    padding: 20px 0 22px;
    border-top: 1px solid var(--line);
  }

  .slide-section:first-child {
    padding-top: 8px;
    border-top: none;
  }

  .section-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .slide-num {
    color: var(--muted);
    font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .slide-name {
    margin-top: 8px;
    font: 600 clamp(1.34rem, 6vw, 1.72rem)/1.02 'Cormorant Garamond', serif;
  }

  .type-tag {
    flex: 0 0 auto;
    padding: 0;
    background: transparent;
    color: var(--accent-soft);
    font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .lead {
    margin-top: 14px;
  }

  .lead-title {
    margin: 0;
    font: 600 clamp(1.78rem, 7.8vw, 2.65rem)/0.98 'Cormorant Garamond', serif;
  }

  .lead-subtitle,
  .lead-footer,
  .fallback-note {
    margin-top: 8px;
    color: var(--text-soft);
    font-size: 1.06rem;
    line-height: 1.62;
    white-space: pre-line;
  }

  .quote-block {
    margin: 0;
    padding: 0;
    border: none;
    background: transparent;
  }

  .quote-text {
    margin: 0;
    font: 600 clamp(1.72rem, 7.6vw, 2.34rem)/1.06 'Cormorant Garamond', serif;
    letter-spacing: -0.01em;
  }

  .quote-attribution {
    margin-top: 10px;
    color: var(--muted);
    font: 600 0.84rem/1.3 'Inter', sans-serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .body-title {
    margin: 16px 0 0;
    color: var(--muted);
    font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .full-text {
    margin-top: 12px;
  }

  .full-paragraph {
    margin: 0;
    color: var(--text);
    font-size: clamp(1.08rem, 4.15vw, 1.2rem);
    line-height: 1.72;
  }

  .full-paragraph + .full-paragraph {
    margin-top: 14px;
  }

  .outline-list {
    margin: 10px 0 0;
    padding: 0;
    list-style: none;
  }

  .outline-item {
    position: relative;
    padding-left: 16px;
    color: var(--text);
    font-size: clamp(1.08rem, 4vw, 1.16rem);
    line-height: 1.64;
  }

  .outline-item + .outline-item {
    margin-top: 10px;
  }

  .outline-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.64em;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: linear-gradient(180deg, #f0cf97, #ba955f);
    box-shadow: 0 0 0 3px rgba(240, 207, 151, 0.14);
  }

  .empty-state {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(214, 185, 134, 0.1);
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.58;
  }

  .footer-note {
    margin: 28px 0 0;
    color: var(--text-soft);
    font-size: 0.96rem;
    line-height: 1.52;
    text-align: center;
  }

  @media (max-width: 540px) {
    .shell {
      width: calc(100vw - 20px);
      padding-top: 14px;
    }

    .hero {
      margin-bottom: 14px;
      padding-bottom: 12px;
    }

    .hero-meta {
      gap: 6px;
    }

    .pill,
    .hero-link {
      min-height: 32px;
      padding: 0 10px;
      font-size: 0.79rem;
    }

    .mode-toggle {
      gap: 4px;
      padding: 3px;
    }

    .mode-button {
      min-height: 32px;
      padding: 0 12px;
      font-size: 0.78rem;
    }

    .jump-list {
      gap: 6px;
    }

    .jump-link {
      font-size: 0.74rem;
    }

    .section-top {
      align-items: flex-start;
      flex-direction: column;
      gap: 6px;
    }

    .slide-section {
      padding: 18px 0 20px;
    }
  }

  @media (min-width: 720px) {
    .shell {
      width: min(820px, calc(100vw - 44px));
    }
  }
</style>
</head>
<body>
<div class="shell">
  <header class="hero">
    <p class="eyebrow">Phone Outline</p>
    <h1 id="deck-title">BG Talk</h1>
    <p id="deck-subtitle" class="subtitle">Text-only mobile view driven by <code>talk-content.js</code>.</p>
    <div class="hero-meta">
      <div id="slide-count" class="pill">0 slides</div>
      <a class="hero-link" href="slides-v0.3.html">Open Full Deck</a>
      <a class="hero-link" href="editor.html">Edit Text</a>
    </div>
    <div class="mode-toggle" role="group" aria-label="Reading mode">
      <button id="mode-full" class="mode-button" type="button" data-mode="full">Full Text</button>
      <button id="mode-outline" class="mode-button" type="button" data-mode="outline">Outline</button>
    </div>
    <nav id="jump-list" class="jump-list" aria-label="Jump to slide"></nav>
  </header>

  <main id="cards" class="sections" aria-live="polite"></main>
  <p class="footer-note">This view uses the same live source as the main deck, so text edits in <code>talk-content.js</code> appear here after refresh.</p>
</div>

<script>
  var viewMode = 'full';

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function multilineToHtml(value) {
    return escapeHtml(value || '').replace(/\n/g, '<br>');
  }

  function parseOutline(value) {
    return String(value || '')
      .split('\n')
      .map(function(line) {
        return line.replace(/^\s*•\s*/, '').trim();
      })
      .filter(Boolean);
  }

  function parseParagraphs(value) {
    return String(value || '')
      .split(/\n\s*\n/)
      .map(function(paragraph) {
        return paragraph.trim();
      })
      .filter(Boolean);
  }

  function buildCardTitle(slide, index) {
    if (slide.editorLabel) {
      return slide.editorLabel;
    }
    if (slide.title) {
      return slide.title.replace(/\n/g, ' ');
    }
    if (slide.quote) {
      return slide.quote.replace(/\n/g, ' ');
    }
    if (slide.text) {
      return slide.text;
    }
    return 'Slide ' + (index + 1);
  }

  function buildJumpLabel(slide, index) {
    var source = slide.quote || slide.title || slide.text || slide.editorLabel || slide.slug || ('Slide ' + (index + 1));
    return source.replace(/\s+/g, ' ').replace(/\n/g, ' ').trim();
  }

  function renderLead(slide) {
    if (slide.quote) {
      return '<blockquote class="quote-block">'
        + '<p class="quote-text">"' + multilineToHtml(slide.quote) + '"</p>'
        + '<div class="quote-attribution">' + escapeHtml(slide.attribution || '') + '</div>'
        + '</blockquote>';
    }

    var parts = [];

    if (slide.title) {
      parts.push('<h2 class="lead-title">' + multilineToHtml(slide.title) + '</h2>');
    } else if (slide.text) {
      parts.push('<h2 class="lead-title">' + multilineToHtml(slide.text) + '</h2>');
    }

    if (slide.subtitle) {
      parts.push('<div class="lead-subtitle">' + multilineToHtml(slide.subtitle) + '</div>');
    }

    if (slide.footer) {
      parts.push('<div class="lead-footer">' + multilineToHtml(slide.footer) + '</div>');
    }

    if (!parts.length) {
      parts.push('<div class="fallback-note">No visible slide text. This is mainly a transition or pause slide in the full deck.</div>');
    }

    return '<div class="lead">' + parts.join('') + '</div>';
  }

  function renderOutline(slide) {
    var items = parseOutline(slide.outline);
    if (!items.length) {
      return '<div class="empty-state">No outline lines for this slide.</div>';
    }

    return '<p class="body-title">Outline</p><ul class="outline-list">'
      + items.map(function(item) {
        return '<li class="outline-item">' + escapeHtml(item) + '</li>';
      }).join('')
      + '</ul>';
  }

  function renderFullText(slide) {
    var paragraphs = parseParagraphs(slide.notes || '');
    if (!paragraphs.length) {
      return '<div class="empty-state">No full text for this slide.</div>';
    }

    return '<p class="body-title">Full Text</p><div class="full-text">'
      + paragraphs.map(function(paragraph) {
        return '<p class="full-paragraph">' + multilineToHtml(paragraph) + '</p>';
      }).join('')
      + '</div>';
  }

  function setMode(nextMode) {
    if (nextMode !== 'full' && nextMode !== 'outline') {
      return;
    }

    viewMode = nextMode;
    try {
      localStorage.setItem('bgTalkPhoneMode', nextMode);
    } catch (error) {
      // Ignore storage issues and keep the current in-memory mode.
    }

    var params = new URLSearchParams(window.location.search);
    params.set('mode', nextMode);
    history.replaceState(null, '', window.location.pathname + '?' + params.toString() + window.location.hash);
    updateModeButtons();
    renderSlides();
  }

  function updateModeButtons() {
    var fullButton = document.getElementById('mode-full');
    var outlineButton = document.getElementById('mode-outline');
    fullButton.classList.toggle('is-active', viewMode === 'full');
    outlineButton.classList.toggle('is-active', viewMode === 'outline');
    fullButton.setAttribute('aria-pressed', viewMode === 'full' ? 'true' : 'false');
    outlineButton.setAttribute('aria-pressed', viewMode === 'outline' ? 'true' : 'false');
  }

  function renderSlides() {
    var content = typeof TALK_CONTENT !== 'undefined' ? TALK_CONTENT : null;
    var slides = content && Array.isArray(content.slides) ? content.slides : [];
    var meta = content && content.meta ? content.meta : {};
    var cards = document.getElementById('cards');
    var jumpList = document.getElementById('jump-list');
    var title = document.getElementById('deck-title');
    var subtitle = document.getElementById('deck-subtitle');
    var count = document.getElementById('slide-count');
    var focusSlide = Number(new URLSearchParams(window.location.search).get('slide') || '0');

    title.textContent = meta.title || 'BG Talk';
    subtitle.textContent = viewMode === 'full'
      ? 'Phone reading view with the full spoken text for each slide.'
      : 'Phone reading view with the slide outlines only.';
    count.textContent = slides.length + ' slides';

    if (!slides.length) {
      cards.innerHTML = '<section class="slide-section"><div class="empty-state">Could not load talk content.</div></section>';
      return;
    }

    jumpList.innerHTML = slides.map(function(slide, index) {
      return '<a class="jump-link" href="#slide-' + (index + 1) + '"><strong>' + (index + 1) + '.</strong> ' + escapeHtml(buildJumpLabel(slide, index)) + '</a>';
    }).join('');

    cards.innerHTML = slides.map(function(slide, index) {
      return '<section id="slide-' + (index + 1) + '" class="slide-section">'
        + '<div class="section-top">'
        + '<div>'
        + '<div class="slide-num">Slide ' + (index + 1) + '</div>'
        + '<div class="slide-name">' + escapeHtml(buildCardTitle(slide, index)) + '</div>'
        + '</div>'
        + '<div class="type-tag">' + escapeHtml(slide.type || 'slide') + '</div>'
        + '</div>'
        + renderLead(slide)
        + (viewMode === 'full' ? renderFullText(slide) : renderOutline(slide))
        + '</section>';
    }).join('');

    if (focusSlide > 0 && focusSlide <= slides.length) {
      var target = document.getElementById('slide-' + focusSlide);
      if (target) {
        requestAnimationFrame(function() {
          target.scrollIntoView({ block: 'start' });
        });
      }
    }
  }

  document.getElementById('mode-full').addEventListener('click', function() {
    setMode('full');
  });

  document.getElementById('mode-outline').addEventListener('click', function() {
    setMode('outline');
  });

  (function initMode() {
    var params = new URLSearchParams(window.location.search);
    var paramMode = params.get('mode');
    var storedMode = '';

    try {
      storedMode = localStorage.getItem('bgTalkPhoneMode') || '';
    } catch (error) {
      storedMode = '';
    }

    if (paramMode === 'full' || paramMode === 'outline') {
      viewMode = paramMode;
    } else if (storedMode === 'full' || storedMode === 'outline') {
      viewMode = storedMode;
    }
  }());

  updateModeButtons();
  renderSlides();
</script>
</body>
</html>
