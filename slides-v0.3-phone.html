<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Talk Phone Outline</title>
<script src="talk-content.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #efe4d1;
    --bg-deep: #dbc3a2;
    --paper: rgba(255, 251, 244, 0.92);
    --paper-strong: rgba(255, 255, 255, 0.82);
    --line: rgba(96, 70, 36, 0.14);
    --line-strong: rgba(96, 70, 36, 0.24);
    --text: #241a10;
    --muted: #746046;
    --accent: #6b5030;
    --accent-soft: #9a7c53;
    --shadow: 0 20px 56px rgba(74, 55, 28, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    background:
      radial-gradient(circle at top, rgba(245, 233, 210, 0.92), transparent 34%),
      linear-gradient(180deg, #fbf6ef 0%, var(--bg) 56%, var(--bg-deep) 100%);
  }

  a {
    color: inherit;
  }

  .shell {
    width: min(860px, calc(100vw - 20px));
    margin: 0 auto;
    padding: 14px 0 40px;
  }

  .hero {
    position: sticky;
    top: 0;
    z-index: 20;
    margin-bottom: 14px;
    padding: 14px 14px 12px;
    border: 1px solid rgba(96, 70, 36, 0.1);
    border-radius: 0 0 24px 24px;
    background: rgba(251, 246, 239, 0.9);
    backdrop-filter: blur(16px);
    box-shadow: 0 14px 28px rgba(74, 55, 28, 0.08);
  }

  .eyebrow {
    margin: 0;
    color: var(--muted);
    font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  h1 {
    margin: 8px 0 0;
    font: 600 clamp(2rem, 10vw, 3.2rem)/0.9 'Cormorant Garamond', serif;
    letter-spacing: -0.02em;
  }

  .subtitle {
    margin: 8px 0 0;
    color: #5d4b33;
    font-size: 0.98rem;
    line-height: 1.4;
  }

  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .pill,
  .hero-link {
    display: inline-flex;
    align-items: center;
    min-height: 36px;
    padding: 0 12px;
    border: 1px solid rgba(96, 70, 36, 0.14);
    border-radius: 999px;
    background: var(--paper-strong);
    color: var(--accent);
    font: 500 0.84rem/1 'Inter', sans-serif;
    text-decoration: none;
  }

  .hero-link {
    border-color: rgba(107, 80, 48, 0.22);
  }

  .jump-strip {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .jump-strip::-webkit-scrollbar {
    display: none;
  }

  .jump-link {
    flex: 0 0 auto;
    max-width: 210px;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(96, 70, 36, 0.12);
    background: rgba(255, 252, 247, 0.7);
    color: #5b4830;
    font-size: 0.82rem;
    line-height: 1.28;
    text-decoration: none;
  }

  .cards {
    display: grid;
    gap: 14px;
  }

  .slide-card {
    scroll-margin-top: 186px;
    padding: 18px 16px 16px;
    border: 1px solid var(--line);
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 251, 244, 0.94)),
      var(--paper);
    box-shadow: var(--shadow);
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }

  .card-label {
    min-width: 0;
  }

  .slide-num {
    color: var(--muted);
    font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .slide-name {
    margin-top: 8px;
    font: 600 1.36rem/1.02 'Cormorant Garamond', serif;
  }

  .type-tag {
    flex: 0 0 auto;
    padding: 7px 10px;
    border-radius: 999px;
    background: rgba(107, 80, 48, 0.08);
    color: var(--accent-soft);
    font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .lead {
    margin-top: 14px;
  }

  .lead-title {
    margin: 0;
    font: 600 clamp(1.7rem, 8vw, 2.5rem)/0.95 'Cormorant Garamond', serif;
  }

  .lead-subtitle,
  .lead-footer,
  .fallback-note {
    margin-top: 8px;
    color: #67533a;
    font-size: 0.96rem;
    line-height: 1.5;
    white-space: pre-line;
  }

  .quote-block {
    margin: 0;
    padding: 18px 16px;
    border-radius: 20px;
    border: 1px solid rgba(96, 70, 36, 0.14);
    background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(252,247,239,0.94));
  }

  .quote-text {
    margin: 0;
    font: 600 clamp(1.42rem, 7.6vw, 2.1rem)/1.02 'Cormorant Garamond', serif;
    letter-spacing: -0.01em;
  }

  .quote-attribution {
    margin-top: 12px;
    color: var(--muted);
    font: 600 0.78rem/1.3 'Inter', sans-serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .outline-title {
    margin: 16px 0 0;
    color: var(--muted);
    font: 600 10px/1 'Inter', sans-serif;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .outline-list {
    margin: 10px 0 0;
    padding: 0;
    list-style: none;
  }

  .outline-item {
    position: relative;
    padding-left: 16px;
    color: #342617;
    font-size: 1rem;
    line-height: 1.52;
  }

  .outline-item + .outline-item {
    margin-top: 10px;
  }

  .outline-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.64em;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: linear-gradient(180deg, #b28e5f, #86643d);
    box-shadow: 0 0 0 3px rgba(178, 142, 95, 0.16);
  }

  .empty-state {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid rgba(96, 70, 36, 0.08);
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .footer-note {
    margin: 18px 0 0;
    color: #6f5b41;
    font-size: 0.9rem;
    line-height: 1.45;
    text-align: center;
  }

  @media (min-width: 720px) {
    .shell {
      width: min(920px, calc(100vw - 36px));
      padding-top: 18px;
    }

    .hero {
      padding: 18px 18px 16px;
    }

    .cards {
      gap: 18px;
    }

    .slide-card {
      padding: 22px 22px 20px;
    }
  }
</style>
</head>
<body>
<div class="shell">
  <header class="hero">
    <p class="eyebrow">Phone Outline</p>
    <h1 id="deck-title">BG Talk</h1>
    <p id="deck-subtitle" class="subtitle">Text-only mobile view driven by <code>talk-content.js</code>.</p>
    <div class="hero-meta">
      <div id="slide-count" class="pill">0 slides</div>
      <a class="hero-link" href="slides-v0.3.html">Open Full Deck</a>
      <a class="hero-link" href="editor.html">Edit Text</a>
    </div>
    <nav id="jump-strip" class="jump-strip" aria-label="Jump to slide"></nav>
  </header>

  <main id="cards" class="cards" aria-live="polite"></main>
  <p class="footer-note">This view uses the same live source as the main deck, so text edits in <code>talk-content.js</code> appear here after refresh.</p>
</div>

<script>
  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function multilineToHtml(value) {
    return escapeHtml(value || '').replace(/\n/g, '<br>');
  }

  function parseOutline(value) {
    return String(value || '')
      .split('\n')
      .map(function(line) {
        return line.replace(/^\s*•\s*/, '').trim();
      })
      .filter(Boolean);
  }

  function buildCardTitle(slide, index) {
    if (slide.editorLabel) {
      return slide.editorLabel;
    }
    if (slide.title) {
      return slide.title.replace(/\n/g, ' ');
    }
    if (slide.quote) {
      return slide.quote.replace(/\n/g, ' ');
    }
    if (slide.text) {
      return slide.text;
    }
    return 'Slide ' + (index + 1);
  }

  function buildJumpLabel(slide, index) {
    var source = slide.quote || slide.title || slide.text || slide.editorLabel || slide.slug || ('Slide ' + (index + 1));
    return source.replace(/\s+/g, ' ').replace(/\n/g, ' ').trim();
  }

  function renderLead(slide) {
    if (slide.quote) {
      return '<blockquote class="quote-block">'
        + '<p class="quote-text">"' + multilineToHtml(slide.quote) + '"</p>'
        + '<div class="quote-attribution">' + escapeHtml(slide.attribution || '') + '</div>'
        + '</blockquote>';
    }

    var parts = [];

    if (slide.title) {
      parts.push('<h2 class="lead-title">' + multilineToHtml(slide.title) + '</h2>');
    } else if (slide.text) {
      parts.push('<h2 class="lead-title">' + multilineToHtml(slide.text) + '</h2>');
    }

    if (slide.subtitle) {
      parts.push('<div class="lead-subtitle">' + multilineToHtml(slide.subtitle) + '</div>');
    }

    if (slide.footer) {
      parts.push('<div class="lead-footer">' + multilineToHtml(slide.footer) + '</div>');
    }

    if (!parts.length) {
      parts.push('<div class="fallback-note">No visible slide text. This is mainly a transition or pause slide in the full deck.</div>');
    }

    return '<div class="lead">' + parts.join('') + '</div>';
  }

  function renderOutline(slide) {
    var items = parseOutline(slide.outline);
    if (!items.length) {
      return '<div class="empty-state">No outline lines for this slide.</div>';
    }

    return '<p class="outline-title">Outline</p><ul class="outline-list">'
      + items.map(function(item) {
        return '<li class="outline-item">' + escapeHtml(item) + '</li>';
      }).join('')
      + '</ul>';
  }

  function renderSlides() {
    var content = typeof TALK_CONTENT !== 'undefined' ? TALK_CONTENT : null;
    var slides = content && Array.isArray(content.slides) ? content.slides : [];
    var meta = content && content.meta ? content.meta : {};
    var cards = document.getElementById('cards');
    var jumpStrip = document.getElementById('jump-strip');
    var title = document.getElementById('deck-title');
    var subtitle = document.getElementById('deck-subtitle');
    var count = document.getElementById('slide-count');
    var params = new URLSearchParams(window.location.search);
    var focusSlide = Number(params.get('slide') || '0');

    title.textContent = meta.title || 'BG Talk';
    subtitle.textContent = meta.subtitle || 'Text-only mobile outline view.';
    count.textContent = slides.length + ' slides';

    if (!slides.length) {
      cards.innerHTML = '<article class="slide-card"><div class="empty-state">Could not load talk content.</div></article>';
      return;
    }

    jumpStrip.innerHTML = slides.map(function(slide, index) {
      return '<a class="jump-link" href="#slide-' + (index + 1) + '"><strong>' + (index + 1) + '.</strong> ' + escapeHtml(buildJumpLabel(slide, index)) + '</a>';
    }).join('');

    cards.innerHTML = slides.map(function(slide, index) {
      return '<article id="slide-' + (index + 1) + '" class="slide-card">'
        + '<div class="card-top">'
        + '<div class="card-label">'
        + '<div class="slide-num">Slide ' + (index + 1) + '</div>'
        + '<div class="slide-name">' + escapeHtml(buildCardTitle(slide, index)) + '</div>'
        + '</div>'
        + '<div class="type-tag">' + escapeHtml(slide.type || 'slide') + '</div>'
        + '</div>'
        + renderLead(slide)
        + renderOutline(slide)
        + '</article>';
    }).join('');

    if (focusSlide > 0 && focusSlide <= slides.length) {
      var target = document.getElementById('slide-' + focusSlide);
      if (target) {
        requestAnimationFrame(function() {
          target.scrollIntoView({ block: 'start' });
        });
      }
    }
  }

  renderSlides();
</script>
</body>
</html>
